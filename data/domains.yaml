    name: 创业
    description: 零到一 · 融资 · 增长
    color: "#10b981"
    status: tree
    x: 20
    y: 35
    residents: [tutor-claude]

  - id: pm
    code: pm
    name: 产品 (PM)
    description: User Insight & Product Sense
    color: "#a855f7"
    status: tree
    x: 65
    y: 40
    residents: [critic-kimi]

  - id: fin
    code: fin
    name: 融资 (Fund)
    description: 估值 · Term Sheet · Cap Table
    color: "#f59e0b"
    status: tree
    x: 10
    y: 65
    residents: []

  - id: ops
    code: ops
    name: 增长 (GTM)
